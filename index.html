<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陶無二客製工廠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#FDFCFB]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ children, className = "w-4 h-4" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const SVGSearch = (props) => <Icon {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>;
        const SVGMountain = (props) => <Icon {...props}><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></Icon>;
        const SVGX = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const SVGChevronLeft = (props) => <Icon {...props}><path d="m15 18-6-6 6-6"/></Icon>;
        const SVGChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
        const SVGArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const SVGArrowUp = (props) => <Icon {...props}><path d="m18 15-6-6-6 6"/></Icon>;
        const SVGCheckCircle2 = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
        const SVGMapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const SVGInfo = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const SVGAward = (props) => <Icon {...props}><path d="m12 15 5 6-5-3-5 3 5-6Z"/><circle cx="12" cy="8" r="7"/></Icon>;
        const SVGPhone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
        const SVGMail = (props) => <Icon {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
        const SVGSparkles = (props) => <Icon {...props}><path d="m12 3 1.91 5.82L20 10.73l-4.74 3.65L16.55 21 12 17.27 7.45 21l1.29-6.62L4 10.73l6.09-1.91L12 3Z"/></Icon>;
        const SVGGlobe = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></Icon>;
        const SVGHome = (props) => <Icon {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
        const SVGImageIcon = (props) => <Icon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;

        const SLIDES = [
          {
            title: "場鑄式透水模組",
            subtitle: "Eco-Friendly Permeable Systems",
            desc: "單孔 / 9孔 / 16孔，場鑄式技術解決積水難題，獲得『綠建材標章認證』，實現雨水逕流回收，打造會呼吸的城市鋪面。",
            image: "https://cdn.phototourl.com/uploads/2026-02-25-e1467c7b-e218-4f5f-a987-634d9d8a7016.jpg",
            category: "透水模組",
            tag: "#綠建材認證"
          },
          {
            title: "高壓混凝土磚",
            subtitle: "High-Pressure Concrete Bricks",
            desc: "經高壓成型、結構緻密且極度耐磨。提供 6cm 與 8cm 多種厚度規格，符合國家 C 級磚抗壓標準。",
            image: "https://cdn.phototourl.com/uploads/2026-02-25-e1467c7b-e218-4f5f-a987-634d9d8a7016.jpg",
            category: "高壓混凝土磚",
            tag: "#高強度耐磨"
          },
          {
            title: "路緣石 / 界石",
            subtitle: "Kerbstones & Boundaries",
            desc: "明確區分道路邊界，引導動線安全。提供標準型與客製化面材，強化景觀工程的結構與秩序感。",
            image: "https://cdn.phototourl.com/uploads/2026-02-25-e1467c7b-e218-4f5f-a987-634d9d8a7016.jpg",
            category: "路緣石/界石",
            tag: "#區域分界"
          },
          {
            title: "客製化藝術陶雕",
            subtitle: "Custom Ceramic Art",
            desc: "由手工捏製，經高溫燒製。將文化故事融入建材，打造獨一無二的建築主牆。",
            image: "https://cdn.phototourl.com/uploads/2026-02-25-e1467c7b-e218-4f5f-a987-634d9d8a7016.jpg",
            category: "客製化藝術陶雕",
            tag: "#手作工藝"
          },
          {
            title: "手工創作圖騰",
            subtitle: "Handmade Art Totems",
            desc: "結合彩色砂與手工鑲嵌，將傳統與現代美學結合。適用於廣場圓環、地標景觀，賦予鋪面藝術靈魂。",
            image: "https://cdn.phototourl.com/uploads/2026-02-25-e1467c7b-e218-4f5f-a987-634d9d8a7016.jpg",
            category: "手工創作圖騰/彩色砂圖騰",
            tag: "#文化鑲嵌美學"
          }
        ];

        const PRODUCTS_DB = [
          { id: 'PM-CAST-01', name: '排水型透水模組', category: '透水模組', price: 0, unit: 'm²', image: 'https://image2url.com/r2/default/images/1773642122777-e2078589-3bf1-4132-b4be-682c81216c1e.jpg', gallery: ['https://image2url.com/r2/default/images/1771997177343-a3aefd78-ecd4-4c1f-b48f-95336bfc5e6c.jpg'], description: '可作為高壓磚基礎外，也可結合壓花/紙模地坪及植草型式，增加鋪面多樣性，並達到雨水逕流回收之功能。', details: { '核心功能': '高性能剛性透水、雨水回收', '認證項目': '綠建材標章認證', '厚度規格': '10cm / 15cm' }, cases: [{ location: '台中 榮總', type: '機車停車場', desc: '全區排水型透水壓花地坪機車停車場。' }], featured: true },
          { id: 'CB-STD-06', name: '高壓混凝土磚(6cm/8cm)', category: '高壓混凝土磚', price: 0, unit: 'm²', image: 'https://image2url.com/r2/default/images/1772005168772-67691105-61af-4a54-a632-1ae6655e4f2b.jpg', gallery: ['https://image2url.com/r2/default/images/1772005375812-7a0580fe-3113-4987-b42c-dcef08510a51.jpg'], description: '經典景觀地磚，經高壓成型結構緻密。廣泛應用於人行道與廣場，提供穩固且平整的行走表面。', details: { '厚度規格': '6cm/8cm', '尺寸規格': '歡迎洽詢', '抗壓標準': '達 C 級磚標準' }, cases: [{ location: '台南 北門', type: '休憩平台', desc: '高壓磚與塊石鋪面搭配石材座椅之親水休憩平台' }], featured: true },
          { id: 'CSW', name: '卡榫路緣石', category: '路緣石/界石', price: 0, unit: '支', image: 'https://image2url.com/r2/default/images/1772000701998-5cab6257-4a8a-4d17-9898-dfc0a4143ce6.png', gallery: ['https://image2url.com/r2/default/images/1772000992206-fa5d6404-e0df-4020-abdc-648bff44f656.png'], description: '具備凹凸互鎖之卡榫設計，大幅提升施工時的對齊穩定度。', details: { '可選面材': '平板面、洗石面、彩雲面' }, cases: [{ location: '雲林 褒忠參天府', type: '人行道', desc: '人行道鋪設美化及廣場鋪面' }], featured: true },
          { id: 'HM-1', name: '手工創作圖騰', category: '手工創作圖騰/彩色砂圖騰', price: 0, unit: '案', image: 'https://image2url.com/r2/default/images/1772594890049-b82e90df-8f9a-489a-8e31-7944140e4b1f.jpg', gallery: ['https://image2url.com/r2/default/images/1772091340705-f232b8cd-d93f-477f-9c38-6d334264c8aa.jpg'], description: '採用天然卵石、半寶石、琉璃石經拋光研磨處理之材料依客製圖案需求手工製作。', details: { '施作位置': '牆面美化', '材質特性': '客製化圖案' }, cases: [{ location: '台中 南寮步道', type: '入口意象', desc: '手工創作圖騰搭配塑木格柵' }], featured: true },
          { id: 'CR', name: '客製化陶雕', category: '客製化藝術陶雕', price: 0, unit: 'm²', image: 'https://image2url.com/r2/default/images/1772429987092-42414003-27ca-4d83-b283-6d56dd6b5fd1.jpg', gallery: ['https://image2url.com/r2/default/images/1772430030156-2cf909d4-2737-48d9-a959-31eca136ea48.jpg'], description: '將牆面提升豐富性，可依照需求設計客製，經高溫窯燒成型。', details: { '藝術風格': '浮雕、彩釉彩繪', '耐候特性': '不褪色、耐磨' }, cases: [{ location: '苗栗 三義勝興', type: '休閒步道', desc: '塑木平台步道欄杆結合陶雕設計' }], featured: true },
          { id: 'WD-4', name: '格柵', category: '塑木系列', price: 0, unit: 'm', image: 'https://image2url.com/r2/default/images/1772430359216-30cd4500-c0e4-416f-a1f9-3b85a3822253.jpg', gallery: ['https://image2url.com/r2/default/images/1773621637830-15e9805f-b137-4362-a72b-c8c4a7823195.jpg'], description: '經複合工藝擠壓成型搭配鋁型材骨架進行扣合安裝。', details: { '材質成分': '聚氯乙烯 (PVC) + ASA + 木分子' }, cases: [{ location: '苗栗 山腳國小', type: '圍牆格柵', desc: '校園圍牆結合塑木格柵設計' }], featured: true }
        ];

        const CATEGORIES = ['全部', '透水模組', '高壓混凝土磚', '路緣石/界石', '客製化藝術陶雕', '手工創作圖騰/彩色砂圖騰', '塑木系列'];

        const App = () => {
          const [activeCategory, setActiveCategory] = useState('全部');
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [currentSlide, setCurrentSlide] = useState(0);
          const [showTopBtn, setShowTopBtn] = useState(false);

          const scrollToContent = () => {
            const element = document.getElementById('main-content');
            if (element) {
              const yOffset = -100; 
              const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
              window.scrollTo({ top: y, behavior: 'smooth' });
            }
          };

          const scrollToTop = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const filteredProducts = useMemo(() => {
            return PRODUCTS_DB.filter(product => {
              if (!product || !product.name) return false;
              const matchesCategory = activeCategory === '全部' || product.category === activeCategory;
              const matchesSearch = 
                product.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                product.description.toLowerCase().includes(searchQuery.toLowerCase());
              return matchesCategory && matchesSearch;
            });
          }, [activeCategory, searchQuery]);

          useEffect(() => {
            const timer = setInterval(() => {
              setCurrentSlide((prev) => (prev + 1) % SLIDES.length);
            }, 5000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            const handleScroll = () => {
              setShowTopBtn(window.scrollY > 400);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % SLIDES.length);
          const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + SLIDES.length) % SLIDES.length);

          const handleBackToHome = () => {
            setActiveCategory('全部');
            setSearchQuery('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const slide = SLIDES[currentSlide];

          return (
            <div className="w-full bg-[#FDFCFB]">
              {/* Header */}
              <div className="fixed top-0 left-0 right-0 bg-white shadow-md z-50">
                <div className="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                  <div className="text-2xl font-bold text-amber-900 cursor-pointer" onClick={handleBackToHome}>
                    陶無二客製工廠
                  </div>
                  <div className="flex gap-2">
                    <div className="relative flex-1 max-w-xs">
                      <input 
                        type="text" 
                        placeholder="搜尋產品..." 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full px-3 py-2 border rounded-lg bg-white"
                      />
                      <SVGSearch className="absolute right-3 top-2.5 w-5 h-5 text-gray-400" />
                    </div>
                  </div>
                </div>
              </div>

              {/* Banner Carousel */}
              <div className="mt-20 relative h-80 overflow-hidden rounded-lg shadow-lg mx-4 mt-4">
                <div className="relative w-full h-full">
                  <img 
                    src={slide.image} 
                    alt={slide.title}
                    className="w-full h-full object-cover"
                  />
                  <div className="absolute inset-0 bg-black bg-opacity-40 flex flex-col justify-center items-center text-white text-center">
                    <h2 className="text-4xl font-bold mb-2">{slide.title}</h2>
                    <p className="text-xl mb-4">{slide.subtitle}</p>
                    <p className="text-sm mb-6 max-w-2xl">{slide.desc}</p>
                    <button 
                      onClick={scrollToContent}
                      className="bg-amber-600 hover:bg-amber-700 px-6 py-2 rounded-lg flex items-center gap-2"
                    >
                      查看產品 <SVGArrowRight className="w-4 h-4" />
                    </button>
                  </div>
                </div>

                {/* Carousel Controls */}
                <button 
                  onClick={prevSlide}
                  className="absolute left-4 top-1/2 -translate-y-1/2 bg-white rounded-full p-2 hover:bg-gray-200"
                >
                  <SVGChevronLeft className="w-6 h-6" />
                </button>
                <button 
                  onClick={nextSlide}
                  className="absolute right-4 top-1/2 -translate-y-1/2 bg-white rounded-full p-2 hover:bg-gray-200"
                >
                  <SVGChevronRight className="w-6 h-6" />
                </button>

                {/* Dots */}
                <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                  {SLIDES.map((_, idx) => (
                    <div 
                      key={idx}
                      className={`h-2 w-2 rounded-full cursor-pointer ${idx === currentSlide ? 'bg-white' : 'bg-white bg-opacity-50'}`}
                      onClick={() => setCurrentSlide(idx)}
                    />
                  ))}
                </div>
              </div>

              {/* Category Filter */}
              <div id="main-content" className="max-w-7xl mx-auto px-4 py-8">
                <div className="flex flex-wrap gap-3 mb-8">
                  {CATEGORIES.map(category => (
                    <button
                      key={category}
                      onClick={() => setActiveCategory(category)}
                      className={`px-4 py-2 rounded-full transition-all ${
                        activeCategory === category
                          ? 'bg-amber-600 text-white'
                          : 'bg-gray-200 text-gray-800 hover:bg-gray-300'
                      }`}
                    >
                      {category}
                    </button>
                  ))}
                </div>

                {/* Products Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                  {filteredProducts.map(product => (
                    <div 
                      key={product.id}
                      className="bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow overflow-hidden cursor-pointer"
                      onClick={() => setSelectedProduct(product)}
                    >
                      <img 
                        src={product.image} 
                        alt={product.name}
                        className="w-full h-48 object-cover"
                      />
                      <div className="p-4">
                        <h3 className="text-lg font-semibold text-gray-800 mb-2">{product.name}</h3>
                        <p className="text-sm text-gray-600 mb-3 line-clamp-2">{product.description}</p>
                        <div className="flex justify-between items-center">
                          <span className="text-xs bg-amber-100 text-amber-800 px-3 py-1 rounded-full">
                            {product.category}
                          </span>
                          <span className="text-amber-600 font-semibold">{product.unit}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {filteredProducts.length === 0 && (
                  <div className="text-center py-12">
                    <p className="text-gray-500 text-lg">未找到符合的產品</p>
                  </div>
                )}
              </div>

              {/* Product Detail Modal */}
              {selectedProduct && (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-lg max-w-2xl w-full max-h-screen overflow-y-auto">
                    <div className="p-6">
                      <button 
                        onClick={() => setSelectedProduct(null)}
                        className="float-right text-2xl text-gray-500 hover:text-gray-700"
                      >
                        ×
                      </button>
                      <img 
                        src={selectedProduct.image} 
                        alt={selectedProduct.name}
                        className="w-full h-64 object-cover rounded-lg mb-4"
                      />
                      <h2 className="text-3xl font-bold mb-4">{selectedProduct.name}</h2>
                      <p className="text-gray-700 mb-4">{selectedProduct.description}</p>
                      
                      <div className="mb-6">
                        <h3 className="font-semibold text-lg mb-3">詳細規格</h3>
                        <div className="bg-gray-50 p-4 rounded-lg">
                          {Object.entries(selectedProduct.details || {}).map(([key, value]) => (
                            <div key={key} className="flex justify-between mb-2">
                              <span className="font-medium">{key}：</span>
                              <span>{value}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {selectedProduct.cases && selectedProduct.cases.length > 0 && (
                        <div className="mb-6">
                          <h3 className="font-semibold text-lg mb-3">施工案例</h3>
                          <div className="space-y-3">
                            {selectedProduct.cases.map((caseItem, idx) => (
                              <div key={idx} className="bg-blue-50 p-3 rounded-lg">
                                <p className="font-medium text-blue-900">{caseItem.location}</p>
                                <p className="text-sm text-blue-800">{caseItem.type}</p>
                                <p className="text-sm text-gray-700">{caseItem.desc}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      <button 
                        className="w-full bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-lg font-semibold"
                        onClick={() => setSelectedProduct(null)}
                      >
                        詢問報價
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Footer */}
              <div className="bg-gray-800 text-white py-12 mt-12">
                <div className="max-w-7xl mx-auto px-4">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                    <div>
                      <h4 className="text-lg font-semibold mb-4 flex items-center gap-2">
                        <SVGMapPin className="w-5 h-5" /> 聯絡資訊
                      </h4>
                      <p className="text-gray-300">台灣中部客製工廠</p>
                    </div>
                    <div>
                      <h4 className="text-lg font-semibold mb-4 flex items-center gap-2">
                        <SVGPhone className="w-5 h-5" /> 客服中心
                      </h4>
                      <p className="text-gray-300">歡迎洽詢報價</p>
                    </div>
                    <div>
                      <h4 className="text-lg font-semibold mb-4 flex items-center gap-2">
                        <SVGMail className="w-5 h-5" /> 郵件
                      </h4>
                      <p className="text-gray-300">歡迎來信詢問</p>
                    </div>
                  </div>
                  <div className="border-t border-gray-700 pt-8 text-center text-gray-400">
                    <p>&copy; 2026 陶無二客製工廠 | 所有權利保留</p>
                  </div>
                </div>
              </div>

              {/* Scroll to Top Button */}
              {showTopBtn && (
                <button
                  onClick={scrollToTop}
                  className="fixed bottom-8 right-8 bg-amber-600 hover:bg-amber-700 text-white rounded-full p-3 shadow-lg z-40"
                >
                  <SVGArrowUp className="w-6 h-6" />
                </button>
              )}
            </div>
          );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
